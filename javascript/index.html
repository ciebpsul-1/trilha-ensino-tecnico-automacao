<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta namwidth="device-width," initial-scale="1.0" />
    <title>Formulário</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark">
    <div
      class="bg-dark vh-100 m-0 align-items-start justify-content-center row row-cols-2"
    >
      <div
        class="col-4 d-flex flex-column align-items-start text-center formulario mt-5"
      >
        <div class="mb-3">
          <label for="" class="form-label text-white">Funcionário</label>
          <input type="text" class="form-control bg-dark text-light" />
        </div>
        <div class="mb-3">
          <label for="" class="form-label text-white"
            >Código do Funcionário</label
          >
          <input type="text" class="form-control bg-dark text-light" />
        </div>

        <div class="mb-3">
          <label for="" class="form-label text-white">Salário</label>
          <input
            id="currency"
            type="text"
            placeholder="R$0,00"
            pattern="^\d+(?:\.\d+)?$"
            class="form-control bg-dark text-light"
          />
        </div>
        <div class="mb-3">
          <label for="" class="form-label text-white">Cargo</label>
          <input type="text" class="form-control bg-dark text-light" />
        </div>

        <div class="mb-3">
          <label for="" class="form-label text-white">Ano de Contratação</label>
          <input type="text" class="form-control bg-dark text-light" />
        </div>
        <div class="mb-3">
          <label for="" class="form-label text-white">Regime</label>
          <input type="text" class="form-control bg-dark text-light" />
        </div>
        <div class="mb-3">
          <label for="" class="form-label text-white"
            >Total de faltas (justificadas e injustificadas)</label
          >
          <input type="text" class="form-control bg-dark text-light" />
        </div>
        <button id="register-btn" class="btn btn-dark border border-white">
          Registrar
        </button>
      </div>
      <div class="col align-self-start text-center mt-5">
        <span class="text-white fs-3">Banco de dados</span>
        <table class="table table-dark table-striped">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Código</th>
              <th>Salário</th>
              <th>Cargo</th>
              <th>Ano da Contratação</th>
              <th>Regime</th>
              <th>Total de faltas</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <script src="app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
